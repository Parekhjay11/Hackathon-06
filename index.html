<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>Smart Notes & Preferences Manager</title>
 
<link rel="stylesheet" href="styles.css">
 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 
</head>
<body>
 
<header>
 
<div class="logo">
<i class="fa-solid fa-note-sticky"></i>
<h1>Smart Notes Manager</h1>
</div>
 
<div class="theme-container">
 
<label for="themeSelect">Theme</label>
 
<select id="themeSelect">
 
<option value="light"> &#9728 Light</option>
<option value="dark"> &#127769  Dark</option>
 
</select>
 
</div>
 
</header>
 
 
<div class="container">
 
<!-- Greeting Card -->
 
<div class="card">
 
<h2>
<i class="fa-solid fa-user"></i>
Personal Greeting
</h2>
 
<input
type="text"
id="username"
placeholder="Enter your name">
 
<button id="saveNameBtn">
<i class="fa-solid fa-floppy-disk"></i>
Save Name
</button>
 
<h3 id="greeting"></h3>
 
</div>
 
 
<!-- Notes Card -->
 
<div class="card">
 
<h2>
<i class="fa-solid fa-pen"></i>
My Notes
</h2>
 
<textarea
id="noteInput"
placeholder="Write your notes here..."></textarea>
 
<div class="buttons">
 
<button id="addNoteBtn">
 
<i class="fa-solid fa-plus"></i>
 
Add Note
 
</button>
 
 
<button id="clearSessionBtn">
 
<i class="fa-solid fa-trash"></i>
 
Clear Draft
 
</button>
 
</div>
 
<ul id="notesList"></ul>
 
</div>
 
</div>
 
<div id="message"></div>
 
<script src="script.js"></script>
 
</body>
</html>
